<div class="dashboard-page">
    <div class="dashboard-card">
        <div class="top-banner">
            <div class="logos-box">
                <img src="LOGORADIO.png" alt="Logo Radio" class="logo logo-main">
                <img src="LOGO TVU.png" alt="Logo TVU" class="logo logo-main">
            </div>

            <div class="brand-text">
                <p class="brand-line">Radio Universitaria</p>
                <p class="brand-line">y Televisión Universitaria</p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="title-block">
            <h1 class="title">ADMINISTRADOR DE</h1>
            <h2 class="title title-strong">CONTACTOS</h2>
        </div>

        <div class="toolbar">
            <div class="search-row">
                <mat-form-field appearance="outline" class="search-field orange-field">
                    <mat-label>Buscar</mat-label>
                    <input matInput type="text" [(ngModel)]="busqueda" />
                    <button *ngIf="busqueda" mat-icon-button matSuffix type="button" (click)="limpiarBusqueda()" aria-label="Limpiar búsqueda">
						<mat-icon>close</mat-icon>
					</button>
                </mat-form-field>
                <button mat-raised-button color="primary" class="search-button" type="button" aria-label="Buscar">
					<mat-icon>search</mat-icon>
				</button>
            </div>

            <button mat-raised-button color="primary" class="new-button" type="button" (click)="nuevoContacto()">
				<mat-icon>add</mat-icon>
				<span>Nuevo contacto</span>
			</button>
        </div>

        <div class="filters-block">
            <p class="filters-label">Filtrar lista</p>

            <div class="filters-row">
                <button mat-stroked-button type="button" class="filter-button" [class.filter-active]="filtroActivo === 'nombre'" (click)="setFiltro('nombre')">
					Nombre
				</button>

                <button mat-stroked-button type="button" class="filter-button" [class.filter-active]="filtroActivo === 'institucion'" (click)="setFiltro('institucion')">
					Institución
				</button>

                <button mat-stroked-button type="button" class="filter-button" [class.filter-active]="filtroActivo === 'cargo'" (click)="setFiltro('cargo')">
					Cargo
				</button>
            </div>
        </div>

        <div class="table-shell">
            <div class="table-watermark"></div>

            <div class="table-scroll">
                <table mat-table [dataSource]="contactosFiltrados" class="dashboard-table">
                    <ng-container matColumnDef="nombre">
                        <th mat-header-cell *matHeaderCellDef>Nombre</th>
                        <td mat-cell *matCellDef="let row">{{ row.nombre }}</td>
                    </ng-container>

                    <ng-container matColumnDef="institucion">
                        <th mat-header-cell *matHeaderCellDef>Institución</th>
                        <td mat-cell *matCellDef="let row">{{ row.institucion }}</td>
                    </ng-container>

                    <ng-container matColumnDef="telefono">
                        <th mat-header-cell *matHeaderCellDef>Teléfono</th>
                        <td mat-cell *matCellDef="let row">{{ row.telefono }}</td>
                    </ng-container>

                    <ng-container matColumnDef="cargo">
                        <th mat-header-cell *matHeaderCellDef>Cargo</th>
                        <td mat-cell *matCellDef="let row">{{ row.cargo }}</td>
                    </ng-container>

                    <ng-container matColumnDef="acciones">
                        <th mat-header-cell *matHeaderCellDef>Acciones</th>
                        <td mat-cell *matCellDef="let row">
                            <div class="actions-cell">
                                <button mat-icon-button type="button" class="action-button edit-button" (click)="editarContacto(row)" aria-label="Editar contacto">
									<mat-icon>edit</mat-icon>
								</button>

                                <button mat-icon-button type="button" class="action-button delete-button" (click)="eliminarContacto(row)" aria-label="Eliminar contacto">
									<mat-icon>delete</mat-icon>
								</button>
                            </div>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                </table>
            </div>
        </div>
    </div>
</div>
