<div class="login-page">
    <div class="login-card">
        <div class="logos-top logos-row">
            <img src="LOGORADIO.png" alt="TVU Logo 1" class="logo logo-main">
            <img src="LOGO TVU.png" alt="TVU Logo 2" class="logo logo-main">
        </div>

        <div class="divider"></div>

        <h3 class="title">AGENDA</h3>
        <p class="subtitle">Ingresa tu C.I</p>

        <mat-form-field appearance="outline" class="full-width">
            <mat-label>C.I</mat-label>
            <input matInput type="text" [(ngModel)]="ci">
        </mat-form-field>

        <button mat-raised-button color="primary" class="login-button" type="button" (click)="ingresar()">
			Iniciar
		</button>

        <div class="registro-opcion">
            <span>¿No tienes cuenta?</span>
            <button mat-button color="primary" type="button" (click)="irARegistro()">
				Registrarse
			</button>
        </div>
    </div>
</div>
